<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Search for Kids</title>

    <style>
        body {
            font-family: "Comic Sans MS", cursive;
            background: #f0f8ff;
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        #search-container {
            margin: 30px auto;
            max-width: 600px;
        }

        #search-input {
            width: 70%;
            padding: 12px;
            border: 2px solid #4CAF50;
            border-radius: 20px;
            font-size: 16px;
            outline: none;
        }

        #search-btn {
            padding: 12px 22px;
            border: none;
            border-radius: 20px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
            font-size: 16px;
            margin-left: 10px;
        }

        #search-btn:hover {
            background: #45a049;
        }

        #results {
            margin-top: 40px;
        }

        .result-item {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 2px 10px rgba(0,0,0,.15);
        }

        .result-item img {
            max-width: 300px;
            margin-bottom: 20px;
        }

        .construction-container,
        .blocked-container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 2px 10px rgba(0,0,0,.15);
        }

        .construction-title {
            font-size: 26px;
            font-weight: bold;
        }

        .divider {
            height: 1px;
            background: #000;
            margin: 20px auto;
            width: 80%;
        }

        .blocked-image {
            width: 120px;
            margin-bottom: 20px;
        }

        .refresh-message {
            margin-top: 15px;
            font-style: italic;
            color: gray;
        }
    </style>
</head>

<body>

<h1>🔍 Safe Search for Kids</h1>

<div id="search-container">
    <input
        type="text"
        id="search-input"
        placeholder="Search science, games, cartoons..."
    >

    <button id="search-btn">
        Search
    </button>
</div>

<div id="results"></div>

<div id="no-results" style="display:none;"></div>

<script src="script.js"></script>

</body>
</html>
